# WeWrite 风格配置
# 复制为 style.yaml 并修改为你的公众号信息
# 或让 WeWrite 在首次使用时通过对话自动生成

name: "Demo科技"
industry: "科技/互联网"
target_audience: "25-40岁互联网从业者、科技爱好者"

# 内容方向
topics:
  - AI/人工智能
  - 产品设计
  - 创业/商业模式
  - 效率工具

# 写作风格
tone: "专业但不学术，有观点但不偏激，偶尔幽默"
voice: "第一人称，像一个懂行的朋友在分享见解"
word_count: "1500-2500"

# 内容风格（干货/故事/情绪/热点/测评）
# 影响选题偏好和框架推荐
content_style: "干货"

# 写作人格（决定文章语感和 AI 检测通过率）
# 可选：midnight-friend / industry-observer / sharp-journalist / warm-editor / cold-analyst
# 详见 personas/ 目录
writing_persona: "midnight-friend"

# 禁忌
blacklist:
  words: ["震惊", "必看", "不转不是中国人", "赶紧收藏"]
  topics: ["政治敏感", "宗教", "色情", "赌博"]

# 参考账号风格
reference_accounts:
  - "36氪"
  - "虎嗅"
  - "少数派"

# 选题策略
topic_policy:
  hotspot_principle: "国内热点发现，可信信息补证；不追纯热搜，要把热点翻译成账号能讲清楚的问题"
  hotspot_sources:
    - "微博热搜"
    - "百度热搜"
    - "今日头条热榜"
    - "微信指数/搜一搜趋势"
    - "知乎热榜"
  scoring_bias:
    - "优先选择和账号定位强相关、能解释机制或方法的热点"
    - "热度高但没有解释价值的热点降权"

# 信息源偏好
source_policy:
  principle: "优先使用一手来源和可信媒体；参考账号只做风格参考，不作为默认事实来源"
  preferred_platforms: ["x.com", "reddit.com", "github.com", "youtube.com"]
  preferred_media: ["reuters.com", "bloomberg.com", "ft.com"]
  avoid_as_primary_sources: ["mp.weixin.qq.com", "zhihu.com"]
  source_rules:
    - "社交平台可作为线索，重大事实必须交叉验证"
  search_queries:
    - "{选题关键词英文} site:x.com OR site:reddit.com OR site:github.com"

# 排版
# auto = 根据文章内容和最近历史自动轮换；fixed = 固定使用 theme
theme_mode: "auto"
theme: "professional-clean"

# 封面
cover_style: "简洁科技感，蓝色调，扁平化设计"
# cover_template: ""  # 设置后跳过 AI 生成，直接使用该文件

# 署名
author: "Demo编辑部"
