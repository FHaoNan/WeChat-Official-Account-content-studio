name: "token-clean"
description: "烧 Token 的人主主题：冷白底、石墨文字、青绿色强调，工程师笔记感，克制耐看"
colors:
  primary: "#0f766e"
  secondary: "#14b8a6"
  text: "#111827"
  text_light: "#4b5563"
  background: "#ffffff"
  code_bg: "#f3f4f6"
  code_color: "#0f766e"
  quote_border: "#0f766e"
  quote_bg: "#f0fdfa"
  border_radius: "6px"
  darkmode:
    background: "#0f172a"
    text: "#e5e7eb"
    text_light: "#9ca3af"
    primary: "#5eead4"
    code_bg: "#111827"
    code_color: "#99f6e4"
    quote_bg: "#102a2a"
    quote_border: "#5eead4"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: #111827;
    background: #ffffff;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    word-wrap: break-word;
  }

  h1 {
    font-size: 24px;
    font-weight: 850;
    color: #111827;
    margin: 30px 0 16px 0;
    padding: 0 0 0 12px;
    border-left: 5px solid #0f766e;
    border-bottom: none;
    line-height: 1.28;
  }

  h2 {
    font-size: 20px;
    font-weight: 800;
    color: #111827;
    margin: 30px 0 14px 0;
    padding: 0 0 8px 0;
    border-left: none;
    border-bottom: 1px solid #e5e7eb;
    line-height: 1.4;
  }

  h3 {
    font-size: 18px;
    font-weight: 700;
    color: #0f766e;
    margin: 26px 0 12px 0;
    line-height: 1.45;
  }

  h4 {
    font-size: 16px;
    font-weight: 700;
    color: #111827;
    margin: 22px 0 10px 0;
    line-height: 1.45;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    color: #374151;
    margin: 12px 0;
  }

  strong {
    font-weight: 800;
    color: #0f766e;
  }

  em {
    font-style: italic;
    color: #4b5563;
  }

  code {
    font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 13.6px;
    background: #f3f4f6;
    color: #0f766e;
    padding: 3px 6px;
    border-radius: 5px;
  }

  pre {
    background: #111827;
    color: #e5e7eb;
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 18px 0;
    line-height: 1.6;
    border: 1px solid #1f2937;
  }

  pre code {
    font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 13.6px;
    background: none;
    color: #e5e7eb;
    padding: 0;
    border-radius: 0;
  }

  blockquote {
    border-left: 4px solid #0f766e;
    background: #f0fdfa;
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 0 6px 6px 0;
    color: #134e4a;
  }

  blockquote p {
    margin: 8px 0;
    color: #134e4a;
  }

  ul {
    padding-left: 24px;
    margin: 13px 0;
  }

  ol {
    padding-left: 24px;
    margin: 13px 0;
  }

  li {
    font-size: 16px;
    line-height: 1.82;
    color: #111827;
    margin: 6px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  thead {
    background: #f8fafc;
  }

  th {
    background: #f8fafc;
    color: #0f766e;
    font-weight: 800;
    padding: 8px 12px;
    text-align: left;
    border: 1px solid #d1d5db;
    border-bottom: 2px solid #0f766e;
  }

  td {
    padding: 8px 12px;
    border: 1px solid #e5e7eb;
    color: #111827;
  }

  tr {
    background: #ffffff;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 6px;
  }

  a {
    color: #0f766e;
    text-decoration: none;
    font-weight: 600;
  }

  hr {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 28px 0;
  }
